<div id="idwQueryPluginMain" class="bs5">
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">Query Editor</h3>
        </div>
        <div class="panel-body">
            <qp-editor></qp-editor>
        </div>
    </div>
    <div class="panel panel-default" [hidden]="!state.resultsPresent()">
        <div class="panel-heading">
            <h3 class="panel-title" style="display: inline-block">Query Results</h3>
            <button type="button" style="float: right; color: #333" class="close" data-dismiss="modal" aria-label="Close" (click)="closeResultsPane()"><span aria-hidden="true">&times;</span></button>
        </div>
        <div class="panel-body">
            <output-panel></output-panel>
        </div>
    </div>
</div>
