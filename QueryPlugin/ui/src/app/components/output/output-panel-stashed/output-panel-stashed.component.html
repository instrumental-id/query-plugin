<results-table [hidden]="stashedState()?.resultVariety !== 'table'" [results]="stashedState()?.resultsTable || null"></results-table>
<translation-result [hidden]="stashedState()?.resultVariety !== 'translation'" [translation]="stashedState()?.translationResult || null"></translation-result>
<div [hidden]="!stashedState()?.errorMessage">
    <div class="results-error" role="alert" aria-live="polite">
        <i class="glyphicon glyphicon-warning-sign"></i>
        {{stashedState()?.errorMessage}}
    </div>
</div>
