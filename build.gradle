defaultTasks "parentClean", "clean", ":QueryPlugin:build", "copyArtifacts"

tasks.register("parentClean", Delete) {
    delete "$projectDir/build"
}

tasks.register("copyArtifacts", Copy) {
    destinationDir file("$rootDir/build")

    into("distributions") {
        from project(":QueryPlugin").tasks.withType(Zip)
    }
}